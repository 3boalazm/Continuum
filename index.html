<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0B0C0F" />
<title>Continuum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="fonts/thmanyahserifdisplay-Bold.woff2" as="font" type="font/woff2" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%237B7BF0' stroke-width='3' stroke-dasharray='58 20' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  @font-face{font-family:'Thmanyah Serif Display';src:url('fonts/thmanyahserifdisplay-Light.woff2') format('woff2');font-weight:300;font-style:normal;font-display:swap}
  @font-face{font-family:'Thmanyah Serif Display';src:url('fonts/thmanyahserifdisplay-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:'Thmanyah Serif Display';src:url('fonts/thmanyahserifdisplay-Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
  @font-face{font-family:'Thmanyah Serif Display';src:url('fonts/thmanyahserifdisplay-Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap}
  @font-face{font-family:'Thmanyah Serif Display';src:url('fonts/thmanyahserifdisplay-Black.woff2') format('woff2');font-weight:900;font-style:normal;font-display:swap}
  :root{
    --c-ink-900:#F5F6F8; --c-ink-700:#C9CDD6; --c-ink-500:#9AA0AE; --c-ink-300:#6B7180;
    --bg-app:#0B0C0F; --bg-panel:#14161B; --bg-elevated:#1C1F26; --bg-hover:#23233A;
    --border:#262A33; --border-soft:#1e2129;
    --accent:#7B7BF0; --accent-2:#5B5BD6; --accent-soft:#20213a;
    --ai:#A78BFA; --warning:#E2A43A; --success:#3FBE86; --danger:#F26761;
    --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px;
    --sh:0 6px 20px rgba(0,0,0,.35);
    --ease:cubic-bezier(.2,.8,.2,1);
    --sans:'IBM Plex Sans Arabic','Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --display:'Thmanyah Serif Display','IBM Plex Sans Arabic','Inter',serif;
    --appw:480px;
  }
  html[data-theme="light"]{
    --c-ink-900:#0E0F13; --c-ink-700:#2A2D36; --c-ink-500:#565B69; --c-ink-300:#98A0AE;
    --bg-app:#F4F5F8; --bg-panel:#FFFFFF; --bg-elevated:#F7F8FA; --bg-hover:#ECECFB;
    --border:#E2E5EC; --border-soft:#EEF0F4; --accent:#5B5BD6; --accent-2:#4B4BC0; --accent-soft:#ECECFB; --ai:#8B5CF6;
    --sh:0 6px 20px rgba(14,15,19,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:#000;color:var(--c-ink-700);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--accent);color:#fff}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:16px}
  h1,h2,h3{font-family:var(--display);color:var(--c-ink-900);line-height:1.25;letter-spacing:0;font-weight:700}

  /* phone frame on desktop, full-bleed on mobile */
  .app{max-width:var(--appw);margin:0 auto;min-height:100dvh;background:var(--bg-app);
    position:relative;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.5);overflow:hidden}

  /* app bar */
  .bar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg-app) 82%,transparent);
    backdrop-filter:blur(16px);border-bottom:1px solid var(--border-soft);
    display:flex;align-items:center;gap:10px;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px}
  .bar .title{font-family:var(--display);font-weight:700;font-size:20px;color:var(--c-ink-900);display:flex;align-items:center;gap:9px}
  .bar .title .mk{width:20px;height:20px}
  .bar .sp{margin-inline-start:auto;display:flex;gap:6px}
  .ibtn{width:38px;height:38px;border-radius:var(--r-sm);display:grid;place-items:center;color:var(--c-ink-500)}
  .ibtn:active{background:var(--bg-hover)}
  .ibtn svg{width:20px;height:20px}

  /* scroll area */
  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 96px}
  .greet{font-family:var(--display);font-size:24px;font-weight:700;color:var(--c-ink-900);margin:4px 2px 2px;line-height:1.25}
  .sub{color:var(--c-ink-500);font-size:14px;margin:0 2px 18px}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--c-ink-500);text-transform:uppercase;
    margin:22px 2px 10px;display:flex;align-items:center;gap:8px}
  .eyebrow .cnt{color:var(--accent)}

  /* cards */
  .card{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
  .card:active{transform:scale(.995)}
  .tap{transition:transform .12s var(--ease)}

  /* resume hero */
  .resume{background:linear-gradient(150deg,var(--accent-soft),var(--bg-panel) 60%);
    border:1px solid color-mix(in srgb,var(--accent) 35%,var(--border));border-radius:var(--r-xl);
    padding:18px;margin-bottom:14px;box-shadow:var(--sh);position:relative;overflow:hidden}
  .resume .rhead{display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .resume .rhead .dia{color:var(--accent);font-size:16px}
  .resume .rhead .nm{font-weight:700;color:var(--c-ink-900);font-size:16px}
  .resume .rhead .when{margin-inline-start:auto;font-family:var(--mono);font-size:11px;color:var(--warning)}
  .resume .lbl{font-size:11px;color:var(--c-ink-300);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
  .resume .were{color:var(--c-ink-900);font-size:15px;margin-bottom:10px}
  .resume .next{color:var(--c-ink-900);font-size:15px;font-weight:500;margin-bottom:14px}
  .resume .next .dot{color:var(--accent)}
  .mini{margin-bottom:10px}
  .mini .nm{font-weight:600;color:var(--c-ink-900);font-size:14px}
  .mini .st{font-size:12px;color:var(--c-ink-500);font-family:var(--mono)}

  .row{display:flex;align-items:center;gap:12px}
  .between{justify-content:space-between}
  .pill{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600;font-family:var(--mono)}
  .pill.active{background:color-mix(in srgb,var(--success) 16%,transparent);color:var(--success)}
  .pill.paused{background:color-mix(in srgb,var(--warning) 16%,transparent);color:var(--warning)}
  .pill.done{background:var(--bg-hover);color:var(--c-ink-500)}

  .prog{height:6px;background:var(--bg-elevated);border-radius:999px;overflow:hidden;margin-top:10px}
  .prog i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .4s var(--ease)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:600;font-size:14px;
    padding:11px 16px;border-radius:var(--r-sm);transition:.15s var(--ease)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:active{background:var(--accent-2)}
  .btn-ghost{background:var(--bg-elevated);color:var(--c-ink-700);border:1px solid var(--border)}
  .btn-ghost:active{background:var(--bg-hover)}
  .btn-block{width:100%}
  .btn-sm{padding:8px 12px;font-size:13px}

  /* lists */
  .item{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--bg-panel);
    border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:8px}
  .item .ico{width:34px;height:34px;border-radius:9px;background:var(--bg-elevated);display:grid;place-items:center;color:var(--accent);flex-shrink:0;font-size:16px}
  .item .body{flex:1;min-width:0}
  .item .t{color:var(--c-ink-900);font-weight:500;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .m{font-size:12px;color:var(--c-ink-500);font-family:var(--mono);margin-top:1px}
  .item .go{color:var(--c-ink-300)}

  .check{width:22px;height:22px;border-radius:7px;border:2px solid var(--border);flex-shrink:0;display:grid;place-items:center;color:transparent;transition:.15s}
  .check.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .task.done .t{text-decoration:line-through;color:var(--c-ink-300)}
  .naflag{font-size:10px;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);border-radius:999px;padding:1px 7px;font-weight:600}

  .empty{text-align:center;color:var(--c-ink-500);padding:40px 20px;font-size:14px}
  .empty .big{font-size:34px;margin-bottom:10px;opacity:.6}

  /* bottom nav */
  .nav{position:sticky;bottom:0;z-index:30;background:color-mix(in srgb,var(--bg-app) 88%,transparent);
    backdrop-filter:blur(16px);border-top:1px solid var(--border-soft);
    display:flex;align-items:center;justify-content:space-around;
    padding:8px 8px calc(env(safe-area-inset-bottom) + 8px)}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--c-ink-300);font-size:10.5px;font-weight:600;padding:4px 0}
  .tab svg{width:23px;height:23px}
  .tab.on{color:var(--accent)}
  .fab{width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;
    box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 50%,transparent);margin-top:-18px;flex-shrink:0}
  .fab:active{background:var(--accent-2);transform:scale(.94)}
  .fab svg{width:26px;height:26px}

  /* bottom sheet */
  .sheet-back{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center}
  .sheet-back.open{display:flex}
  .sheet{width:100%;max-width:var(--appw);background:var(--bg-panel);border-radius:20px 20px 0 0;
    padding:8px 18px calc(env(safe-area-inset-bottom) + 20px);transform:translateY(100%);transition:transform .28s var(--ease);max-height:88dvh;overflow-y:auto}
  .sheet-back.open .sheet{transform:none}
  .grip{width:38px;height:4px;background:var(--border);border-radius:999px;margin:8px auto 14px}
  .sheet h3{font-size:18px;margin-bottom:14px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--c-ink-500);margin-bottom:6px;font-weight:600}
  .field input,.field textarea,.field select{width:100%;background:var(--bg-elevated);border:1px solid var(--border);
    color:var(--c-ink-900);border-radius:var(--r-sm);padding:12px 13px;outline:none}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
  .field textarea{min-height:90px;resize:vertical;line-height:1.5}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .chip{padding:8px 14px;border-radius:999px;background:var(--bg-elevated);border:1px solid var(--border);
    color:var(--c-ink-500);font-size:13px;font-weight:600}
  .chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .sheet-actions{display:flex;gap:10px;margin-top:6px}
  .sheet-actions .btn{flex:1}

  /* toast */
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);z-index:80;
    background:var(--c-ink-900);color:var(--bg-app);padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:600;
    opacity:0;transition:.25s var(--ease);pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%)}

  .backbtn{color:var(--c-ink-500)}
  .backbtn svg{width:22px;height:22px}
  html[dir="rtl"] .flip{transform:scaleX(-1)}

  .search-in{width:100%;background:var(--bg-panel);border:1px solid var(--border);color:var(--c-ink-900);
    border-radius:var(--r-md);padding:12px 14px;outline:none;margin-bottom:8px}
  .search-in:focus{border-color:var(--accent)}
  .sec-label{font-size:11px;color:var(--c-ink-300);text-transform:uppercase;letter-spacing:.05em;margin:14px 2px 6px;font-family:var(--mono)}
  .link{color:var(--accent);font-weight:600}
  .set-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border-soft)}
  .set-row .k{color:var(--c-ink-900);font-weight:500}
  .seg{display:flex;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
  .seg button{padding:7px 14px;font-size:13px;font-weight:600;color:var(--c-ink-500)}
  .seg button.on{background:var(--accent);color:#fff}
  /* mode pill */
  .modepill{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--accent);background:var(--accent-soft);
    border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);padding:4px 10px;border-radius:999px;margin-inline-start:4px}
  /* drawer */
  .drawer-back{position:absolute;inset:0;z-index:70;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s var(--ease)}
  .drawer-back.open{opacity:1;pointer-events:auto}
  .drawer{position:absolute;inset-block:0;inset-inline-start:0;width:84%;max-width:326px;background:var(--bg-panel);
    border-inline-end:1px solid var(--border);transform:translateX(-100%);transition:transform .28s var(--ease);
    padding:calc(env(safe-area-inset-top) + 18px) 14px calc(env(safe-area-inset-bottom) + 16px);display:flex;flex-direction:column;gap:4px;overflow-y:auto}
  html[dir="rtl"] .drawer{transform:translateX(100%)}
  .drawer-back.open .drawer{transform:none}
  .drawer .brand{font-family:var(--display);display:flex;align-items:center;gap:9px;font-weight:700;color:var(--c-ink-900);font-size:20px;margin:2px 4px 14px}
  .drawer .brand .mk{width:22px;height:22px}
  .modeswitch{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-md);padding:5px;display:flex;gap:5px;margin-bottom:6px}
  .modeswitch button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:12px 6px;border-radius:9px;color:var(--c-ink-500);font-weight:700;font-size:14px;transition:.15s var(--ease)}
  .modeswitch button .d{font-size:10px;font-weight:500;color:var(--c-ink-300)}
  .modeswitch button.on{background:var(--accent);color:#fff}
  .modeswitch button.on .d{color:rgba(255,255,255,.85)}
  .modeswitch button:active{transform:scale(.97)}
  .dsec{font-size:11px;color:var(--c-ink-300);text-transform:uppercase;letter-spacing:.05em;margin:14px 8px 6px;font-family:var(--mono)}
  .dlink{display:flex;align-items:center;gap:13px;padding:13px 12px;border-radius:var(--r-sm);color:var(--c-ink-700);font-weight:500;font-size:15px}
  .dlink svg{width:20px;height:20px;color:var(--c-ink-500)}
  .dlink.on{background:var(--accent-soft);color:var(--accent)}
  .dlink.on svg{color:var(--accent)}
  .dlink:active{background:var(--bg-hover)}
  .drawer .foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--border-soft);display:flex;gap:8px}
  /* quick add */
  .qadd{display:flex;gap:8px;margin-bottom:14px}
  .qadd input{flex:1;background:var(--bg-panel);border:1px solid var(--border);color:var(--c-ink-900);border-radius:var(--r-md);padding:13px 14px;outline:none}
  .qadd input:focus{border-color:var(--accent)}
  .qadd button{width:50px;flex-shrink:0;border-radius:var(--r-md);background:var(--accent);color:#fff;display:grid;place-items:center}
  .qadd button:active{background:var(--accent-2)}
  .qstrip{display:flex;align-items:center;gap:12px;background:linear-gradient(150deg,var(--accent-soft),var(--bg-panel) 70%);
    border:1px solid color-mix(in srgb,var(--accent) 30%,var(--border));border-radius:var(--r-lg);padding:14px;margin-bottom:14px}
  .qstrip .body{flex:1;min-width:0}
  .qstrip .nm{font-weight:700;color:var(--c-ink-900)}
  .qstrip .nx{font-size:13px;color:var(--c-ink-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

  /* rich home: hero */
  .hero-card{background:linear-gradient(160deg,var(--accent-soft),var(--bg-panel) 55%);border:1px solid color-mix(in srgb,var(--accent) 30%,var(--border));
    border-radius:var(--r-xl);padding:18px;margin-bottom:14px;box-shadow:var(--sh)}
  .badgerow{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;font-family:var(--mono);letter-spacing:.03em;
    color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);padding:4px 10px;border-radius:999px;text-transform:uppercase}
  .badge .pulse{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 60%,transparent);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 55%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .lastact{font-size:12px;color:var(--c-ink-500);font-family:var(--mono)}
  .lbl2{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-ink-500);margin-bottom:6px;font-family:var(--mono)}
  .herotitle{font-family:var(--display);font-size:26px;line-height:1.2;color:var(--c-ink-900);margin-bottom:14px;font-weight:700}
  .herotitle .grad{background:linear-gradient(90deg,var(--accent),var(--ai));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .herotitle .dash{color:var(--c-ink-300)}
  .summbox{background:var(--bg-app);border:1px solid var(--border-soft);border-radius:var(--r-md);padding:13px 14px;margin-bottom:12px}
  .siglbl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--c-ink-300);margin-bottom:7px;font-family:var(--mono);display:flex;align-items:center;gap:7px}
  .summ{font-size:14.5px;color:var(--c-ink-700);line-height:1.6}
  .acc{list-style:none;display:flex;flex-direction:column;gap:8px;margin:2px 0 2px}
  .acc li{position:relative;padding-inline-start:20px;font-size:14px;color:var(--c-ink-700)}
  .acc li::before{content:"";position:absolute;inset-inline-start:4px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .nextaction{margin-top:16px;padding-top:14px;border-top:1px solid var(--border-soft)}
  .nextaction .lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-family:var(--mono)}
  .nextaction .na{color:var(--c-ink-900);font-weight:500;font-size:15px;margin-top:4px}
  /* signals */
  .signal{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 15px;margin-bottom:12px}
  .sig{display:flex;align-items:baseline;gap:9px;padding:6px 0;font-size:13.5px;color:var(--c-ink-700);border-bottom:1px solid var(--border-soft)}
  .sig:last-child{border-bottom:none}
  .sig .mono2{font-family:var(--mono);font-size:12px;color:var(--accent);flex-shrink:0}
  .sig .sigt{flex:1;min-width:0}
  .sig .sigw{font-family:var(--mono);font-size:11px;color:var(--c-ink-300);flex-shrink:0;margin-inline-start:auto}
  .sig .bl{flex-shrink:0;font-size:16px;line-height:1}
  .sig .bl.warn{color:var(--warning)} .sig .bl.ok{color:var(--success)} .sig .bl.danger{color:var(--danger)}
  .docchips{display:flex;flex-wrap:wrap;gap:8px}
  .docchip{font-size:12.5px;color:var(--c-ink-700);background:var(--bg-elevated);border:1px solid var(--border);padding:7px 12px;border-radius:var(--r-sm)}
  .docchip:active{background:var(--bg-hover)}
  .recon{font-size:11.5px;color:var(--c-ink-300);font-family:var(--mono);margin:2px 2px 8px;display:flex;align-items:center;gap:6px}
  .between2{display:flex;align-items:center;justify-content:space-between}
  .cntlite{font-size:11px;color:var(--c-ink-300);font-family:var(--mono);text-transform:none;letter-spacing:0}
  /* priority pills */
  .prio{font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.03em;padding:3px 8px;border-radius:6px;flex-shrink:0}
  .prio.high{color:var(--danger);background:color-mix(in srgb,var(--danger) 15%,transparent)}
  .prio.med{color:var(--warning);background:color-mix(in srgb,var(--warning) 15%,transparent)}
  .prio.low{color:var(--c-ink-500);background:var(--bg-hover)}
  /* ai suggestions */
  .sugg{display:flex;gap:12px;align-items:flex-start;background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 14px;margin-bottom:8px}
  .sugg .sicon{width:30px;height:30px;border-radius:8px;background:color-mix(in srgb,var(--ai) 14%,transparent);color:var(--ai);display:grid;place-items:center;flex-shrink:0;font-size:15px}
  .sugg .st2{color:var(--c-ink-900);font-weight:600;font-size:14px}
  .sugg .ss{color:var(--c-ink-500);font-size:12.5px;margin-top:2px}
  /* timeline */
  .tl{display:flex;gap:14px;padding-bottom:16px;position:relative}
  .tl::before{content:"";position:absolute;inset-inline-start:5px;top:14px;bottom:0;width:1px;background:var(--border)}
  .tl:last-child::before{display:none}
  .tldot{width:11px;height:11px;border-radius:50%;background:var(--bg-app);border:2px solid var(--accent);flex-shrink:0;margin-top:3px;z-index:1}
  .tlbody .t{color:var(--c-ink-900);font-size:14px;font-weight:500}
  .tlbody .m{color:var(--c-ink-500);font-size:12px;font-family:var(--mono);margin-top:1px}
  /* assistant */
  .askans{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px;display:flex;gap:12px;line-height:1.7;font-size:14px;color:var(--c-ink-700)}
  .askans .who{width:30px;height:30px;border-radius:8px;background:color-mix(in srgb,var(--ai) 14%,transparent);color:var(--ai);display:grid;place-items:center;flex-shrink:0}
  .askans .na{color:var(--accent);font-weight:500}
  .askans .m{color:var(--c-ink-300);font-size:12px;font-family:var(--mono)}
  .askbtn{color:var(--ai)!important}
  /* drawer pinned dot */
  .pindot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .mono2{font-family:var(--mono)}
  .st{font-size:12px;color:var(--c-ink-500);font-family:var(--mono)}

  /* ============ PHASE 1 — PREMIUM FOUNDATION ============ */
  :root{
    --sora:'Sora','Inter',sans-serif;
    --dm:'DM Sans','IBM Plex Sans Arabic','Inter',sans-serif;
    --ws:#7B7BF0;                 /* active workspace color (dynamic) */
    --ws-soft:rgba(123,123,240,.14);
  }
  body{background:#06060c;font-family:var(--dm)}
  html[data-theme="light"] body{background:#eef0f5}

  /* ambient layer (always alive) */
  #ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .aurora{position:absolute;border-radius:50%;filter:blur(80px);opacity:.55;will-change:transform}
  .a1{width:52vw;max-width:520px;height:52vw;max-height:520px;top:-8%;inset-inline-end:-10%;
      background:radial-gradient(circle,var(--ws-soft),transparent 68%);animation:drift 26s ease-in-out infinite}
  .a2{width:46vw;max-width:460px;height:46vw;max-height:460px;bottom:6%;inset-inline-start:-12%;
      background:radial-gradient(circle,rgba(144,97,249,.12),transparent 70%);animation:drift 32s ease-in-out infinite reverse}
  .a3{width:36vw;max-width:360px;height:36vw;max-height:360px;top:38%;inset-inline-end:-8%;
      background:radial-gradient(circle,rgba(54,214,232,.08),transparent 70%);animation:drift 22s ease-in-out infinite 3s}
  .ws-glow{position:absolute;left:50%;bottom:-24%;width:120vw;max-width:900px;height:60vh;transform:translateX(-50%);
      background:radial-gradient(ellipse at center,var(--ws-soft),transparent 60%);filter:blur(40px);opacity:.8;
      transition:background 1.2s ease;will-change:opacity}
  #particles{position:absolute;inset:0;opacity:.6}
  .noise{position:absolute;inset:0;opacity:.02;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
  html[data-theme="light"] .aurora{opacity:.4}
  html[data-theme="light"] .noise{opacity:.015}

  @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(14px,-20px) scale(1.05)}50%{transform:translate(-10px,14px) scale(.96)}75%{transform:translate(18px,10px) scale(1.02)}}

  /* app shell sits above ambient, transparent so glow shows */
  .app{background:transparent!important;box-shadow:none}
  @media(min-width:768px){
    body{display:flex;align-items:center;justify-content:center}
    html[data-view="mobile"] .app{max-width:440px;height:min(94vh,940px);margin:0;border-radius:40px;overflow:hidden;
      box-shadow:0 0 0 1px rgba(255,255,255,.06),0 30px 90px rgba(0,0,0,.6);background:rgba(6,6,12,.55)!important;backdrop-filter:blur(30px)}
    html[data-view="mobile"][data-theme="light"] .app{background:rgba(244,245,248,.7)!important}
  }
  .bar{background:transparent!important;border-bottom-color:rgba(255,255,255,.05)}
  html[data-theme="light"] .bar{border-bottom-color:rgba(0,0,0,.06)}

  /* glass upgrade for cards */
  .card,.item,.signal,.sugg,.hero-card,.resume,.qstrip,.askans{
    background:rgba(14,14,24,.55)!important;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.06)!important;box-shadow:0 4px 24px rgba(0,0,0,.25)}
  html[data-theme="light"] .card,html[data-theme="light"] .item,html[data-theme="light"] .signal,
  html[data-theme="light"] .sugg,html[data-theme="light"] .hero-card,html[data-theme="light"] .resume,
  html[data-theme="light"] .qstrip,html[data-theme="light"] .askans{
    background:rgba(255,255,255,.72)!important;border-color:rgba(0,0,0,.06)!important;box-shadow:0 4px 24px rgba(20,20,40,.06)}
  .tap{transition:transform .18s var(--ease),box-shadow .25s var(--ease),border-color .25s var(--ease)}
  .card:active,.item:active,.qstrip:active{transform:scale(.985)}
  @media(hover:hover){
    .card:hover,.item:hover,.qstrip:hover{transform:translateY(-2px);border-color:var(--ws-soft)!important;
      box-shadow:0 10px 34px rgba(0,0,0,.32),0 0 40px var(--ws-soft)}
  }

  /* Resume Card = the pulse (identity #1) */
  .hero-card{position:relative;overflow:hidden;border:1px solid color-mix(in srgb,var(--ws) 26%,transparent)!important;
    box-shadow:0 0 0 1px color-mix(in srgb,var(--ws) 8%,transparent),0 10px 44px rgba(0,0,0,.4),0 0 70px var(--ws-soft)!important;
    animation:breathe 6s ease-in-out infinite,floatUp .7s cubic-bezier(.16,1,.3,1) both}
  .hero-card::after{content:"";position:absolute;width:200px;height:200px;top:-50px;inset-inline-end:-50px;border-radius:50%;
    background:radial-gradient(circle,var(--ws-soft),transparent 68%);filter:blur(28px);animation:drift 12s ease-in-out infinite;pointer-events:none}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 1px color-mix(in srgb,var(--ws) 8%,transparent),0 10px 44px rgba(0,0,0,.4),0 0 60px var(--ws-soft)}
    50%{box-shadow:0 0 0 1px color-mix(in srgb,var(--ws) 14%,transparent),0 10px 44px rgba(0,0,0,.4),0 0 100px color-mix(in srgb,var(--ws) 22%,transparent)}}
  @keyframes floatUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .hero-card .grad,.herotitle .grad{background:linear-gradient(90deg,var(--ws),var(--ai))!important;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .badge,.badge .pulse{color:var(--ws)!important}
  .badge{background:color-mix(in srgb,var(--ws) 14%,transparent)!important;border-color:color-mix(in srgb,var(--ws) 30%,transparent)!important}
  .badge .pulse{background:var(--ws)!important}

  /* animated progress line */
  .prog i{background:linear-gradient(90deg,var(--ws),var(--accent))!important;position:relative;overflow:hidden}
  .prog i::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 2.4s ease-in-out infinite}
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

  /* buttons: gradient + spring */
  .btn-primary{background:linear-gradient(135deg,var(--ws),var(--accent-2,#5B5BD6))!important;background-size:200% 200%;animation:gshift 5s ease infinite;
    box-shadow:0 4px 20px color-mix(in srgb,var(--ws) 28%,transparent)}
  .btn-primary:active{transform:scale(.96)}
  @keyframes gshift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

  /* Context Timeline Strip (identity #3) */
  .ctx-strip{display:flex;align-items:center;gap:10px;overflow-x:auto;padding:6px 2px 12px;margin-bottom:6px;scrollbar-width:none}
  .ctx-strip::-webkit-scrollbar{display:none}
  .ctx-dot{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
  .ctx-ring{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;position:relative;
    border:2px solid rgba(255,255,255,.12);transition:transform .2s var(--ease)}
  .ctx-dot:active .ctx-ring{transform:scale(.9)}
  .ctx-ring.full{border-color:var(--ws);background:color-mix(in srgb,var(--ws) 22%,transparent);box-shadow:0 0 14px var(--ws-soft)}
  .ctx-ring.half{border-color:var(--ws);background:conic-gradient(var(--ws) 50%,transparent 0)}
  .ctx-ring.today{box-shadow:0 0 0 3px color-mix(in srgb,var(--ws) 22%,transparent)}
  .ctx-ring .ci{font-size:13px;color:var(--c-ink-700)}
  .ctx-lbl{font-size:9px;color:var(--c-ink-300);font-family:var(--mono)}

  /* Floating bottom nav */
  html[data-view="mobile"] .nav{position:absolute;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);
    background:rgba(14,14,24,.72)!important;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.07);border-radius:22px;padding:8px 6px;
    box-shadow:0 12px 40px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.03)}
  html[data-view="mobile"][data-theme="light"] .nav{background:rgba(255,255,255,.8)!important;border-color:rgba(0,0,0,.06)}
  html[data-view="mobile"] main{padding-bottom:120px}
  .tab{position:relative;transition:color .3s var(--ease),transform .2s}
  .tab.on::before{content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:18px;height:3px;border-radius:0 0 4px 4px;
    background:linear-gradient(90deg,var(--ws),var(--accent));box-shadow:0 0 10px var(--ws-soft)}
  .tab:active{transform:scale(.9)}
  .fab{background:linear-gradient(135deg,var(--ws),var(--accent-2,#5B5BD6))!important;background-size:200% 200%;animation:gshift 5s ease infinite,floaty 4s ease-in-out infinite;
    box-shadow:0 8px 24px color-mix(in srgb,var(--ws) 34%,transparent)}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

  /* section entrance reveals */
  main [data-rv]{opacity:0;transform:translateY(16px);animation:rvIn .55s cubic-bezier(.16,1,.3,1) forwards}
  @keyframes rvIn{to{opacity:1;transform:none}}

  /* ============ MOBILE / DESKTOP VIEW SWITCH ============ */
  html[data-view="desktop"] .app{max-width:1180px;width:96vw;height:min(92vh,900px);border-radius:24px;overflow:hidden;
    display:grid!important;grid-template-columns:264px 1fr;background:rgba(10,10,18,.55)!important;backdrop-filter:blur(30px);
    box-shadow:0 0 0 1px rgba(255,255,255,.06),0 40px 120px rgba(0,0,0,.6)}
  html[data-view="desktop"][data-theme="light"] .app{background:rgba(250,250,253,.75)!important}
  html[data-view="desktop"] .bar{grid-column:2;position:sticky}
  html[data-view="desktop"] main{grid-column:2;grid-row:2;padding:20px 28px 40px}
  html[data-view="desktop"] .nav{display:none}       /* bottom nav hidden on desktop */
  html[data-view="desktop"] .fab{inset-inline-end:32px;bottom:24px}
  /* persistent sidebar on desktop = drawer pinned */
  html[data-view="desktop"] .drawer-back{position:static!important;grid-column:1;grid-row:1 / span 2;
    background:transparent!important;opacity:1!important;pointer-events:auto!important;display:block}
  html[data-view="desktop"] .drawer{position:static!important;transform:none!important;width:100%!important;max-width:none!important;
    height:100%;border-inline-end:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.015)!important;box-shadow:none}
  html[data-view="desktop"][data-theme="light"] .drawer{background:rgba(0,0,0,.015)!important;border-inline-end-color:rgba(0,0,0,.06)}
  html[data-view="desktop"] .ibtn[data-a="menu"]{display:none}   /* no hamburger on desktop */
  /* desktop home two-column */
  html[data-view="desktop"] .home-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:22px;align-items:start}
  html[data-view="desktop"] .home-rail{position:sticky;top:0}
  @media(max-width:900px){html[data-view="desktop"] .app{grid-template-columns:1fr}html[data-view="desktop"] .drawer-back{display:none!important}html[data-view="desktop"] .nav{display:flex}html[data-view="desktop"] .home-grid{grid-template-columns:1fr}}

  /* view switch control in sidebar */
  .viewswitch{display:flex;gap:5px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-md);padding:5px;margin-bottom:8px}
  .viewswitch button{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:9px;color:var(--c-ink-500);font-weight:600;font-size:12px;transition:.15s}
  .viewswitch button.on{background:var(--ws);color:#fff}
  .viewswitch button svg{width:15px;height:15px}

  @media(prefers-reduced-motion:reduce){.aurora,.ws-glow,#particles,.hero-card,.hero-card::after,.fab,.prog i::after,.btn-primary{animation:none!important}}
</style>

  if(!ts)return"";var d=Date.now()-ts,m=60000,h=3600000,day=86400000;var L=I18N[S.lang];

/* ---- Tasks ---- */
function vTasks(){

/* ---- Journal ---- */
function vJournal(){
  var h='<div class="greet">'+T("journal")+'</div><div class="sub">'+T("today")+' · '+new Date().toLocaleDateString(S.lang==="ar"?"ar-EG":"en")+'</div>';

  var worked=[];

  h+='<div class="eyebrow">'+T("workedOn")+'</div>';

function todayKeyOf(d){return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}

/* ---- Search ---- */
function vSearch(){
  var q=(S._q||"").trim().toLowerCase();
  var h='<input class="search-in" id="searchInput" placeholder="'+T("searchPh")+'" value="'+esc(S._q||"")+'" autocomplete="off">';
  if(!q)return h+'<div class="empty" style="padding:30px">'+svg(IC.search)+'</div>';
  var res={projects:[],tasks:[],notes:[]};
  S.projects.forEach(function(p){if((p.name+" "+(p.nextAction||"")).toLowerCase().indexOf(q)>=0)res.projects.push(p)});
  S.tasks.forEach(function(t){if(t.title.toLowerCase().indexOf(q)>=0)res.tasks.push(t)});
  S.notes.forEach(function(n){if((n.title+" "+n.body).toLowerCase().indexOf(q)>=0)res.notes.push(n)});
  var total=res.projects.length+res.tasks.length+res.notes.length;
  if(!total)return h+'<div class="empty" style="padding:30px">'+T("noResults")+'</div>';
  if(res.projects.length){h+='<div class="sec-label">'+T("projects")+'</div>';res.projects.forEach(function(p){h+='<div class="item tap" data-a="open" data-id="'+p.id+'"><div class="ico">◈</div><div class="body"><div class="t">'+esc(p.name)+'</div></div>'+svg(IC.chev,"flip go")+'</div>'})}
  if(res.tasks.length){h+='<div class="sec-label">'+T("tasks")+'</div>';res.tasks.forEach(function(t){var p=project(t.projectId);h+='<div class="item"><div class="ico">✓</div><div class="body"><div class="t">'+esc(t.title)+'</div>'+(p?'<div class="m">'+esc(p.name)+'</div>':'')+'</div></div>'})}
  if(res.notes.length){h+='<div class="sec-label">'+T("notesT")+'</div>';res.notes.forEach(function(n){h+='<div class="item tap" data-a="openNote" data-id="'+n.id+'"><div class="ico">📝</div><div class="body"><div class="t">'+esc(n.title)+'</div></div></div>'})}
  return h;
}

/* ---- Home (advanced, rich) ---- */
function prioRank(p){return {high:3,med:2,low:1}[p]||0}
function prioPill(p){if(!p)return"";return '<span class="prio '+p+'">'+T(p==="high"?"pHigh":p==="med"?"pMed":"pLow")+'</span>'}
function dueLabel(ts){if(!ts)return"";var t=startOfDay(Date.now()),d=startOfDay(ts),day=86400000;
  if(d===t)return T("dueToday");if(d===t+day)return T("dueTomorrow");
  return new Date(ts).toLocaleDateString(S.lang==="ar"?"ar-EG":"en",{weekday:"short",day:"numeric"})}
function fmtEst(m){var h=Math.floor(m/60),mm=m%60;return((h?h+"h ":"")+(mm?mm+"m":"")).trim()||"0m"}
function signalBlock(title,inner){return '<div class="signal"><div class="siglbl">'+title+'</div>'+inner+'</div>'}
function empty(msg,ic){return '<div class="empty"><div class="big">'+(ic||"·")+'</div>'+msg+'</div>'}
function aiSuggestions(){
  var out=[],now=Date.now(),day=86400000;
  S.projects.filter(function(p){return p.status==="active"}).forEach(function(p){
    var last=p.lastWorkedAt||p.createdAt,d=Math.floor((now-last)/day);
    if(d>=3)out.push({icon:"↯",title:p.name+" "+(S.lang==="ar"?"واقف":"is stalling"),sub:S.lang==="ar"?("مفيش جلسات من "+d+" أيام. تحجز 30 د؟"):("No sessions in "+d+" days. Schedule 30m?")});
  });
  S.projects.forEach(function(p){var ns=S.notes.filter(function(n){return n.projectId===p.id});
    if(ns.length>=3)out.push({icon:"⌗",title:(S.lang==="ar"?"ادمج ملاحظات ":"Merge notes in ")+p.name,sub:ns.length+(S.lang==="ar"?" ملاحظات مرتبطة — تدمجها؟":" related notes — consolidate?")})});
  S.projects.forEach(function(p){
    var decs=S.decisions.filter(function(d){return d.projectId===p.id});
    var rfc=S.notes.some(function(n){return n.projectId===p.id&&/rfc/i.test(n.title)});
    if(rfc&&decs.length&&decs.every(function(d){return d.status!=="pending"}))
      out.push({icon:"✓",title:S.lang==="ar"?"اقفل الـ RFC":"Close the RFC",sub:S.lang==="ar"?"كل القرارات متسجلة — جاهز للنشر.":"All decisions logged; ready to publish."})});
  return out.slice(0,3);
}
function ctxStrip(){
  var all=[];
  S.projects.forEach(function(p){(p.sessions||[]).forEach(function(s){all.push({p:p,s:s,at:s.endedAt||s.startedAt})})});
  all.sort(function(a,b){return b.at-a.at});
  var recent=all.slice(0,7).reverse();
  if(!recent.length)return"";
  var tk=startOfDay(Date.now());
  var h='<div class="ctx-strip">';
  recent.forEach(function(e){
    var acc=(e.s.accomplishments||[]).length,cls=acc>=2?"full":acc==1?"half":"",today=startOfDay(e.at)===tk?" today":"";
    h+='<div class="ctx-dot" data-a="resume" data-id="'+e.p.id+'" title="'+esc(e.s.summary||"")+'"><div class="ctx-ring '+cls+today+'"><span class="ci" style="color:'+(e.p.color||"var(--ws)")+'">◈</span></div><span class="ctx-lbl">'+rel(e.at)+'</span></div>';
  });
  return h+'</div>';
}
function vHome(){
  var withSess=S.projects.filter(function(p){return p.sessions&&p.sessions.length}).sort(function(a,b){return(b.lastWorkedAt||0)-(a.lastWorkedAt||0)});
  if(!withSess.length){
    return '<div class="greet">'+T(greetKey())+'</div><div class="sub">'+T("nothingSub")+'</div>'+
      '<div class="resume"><div class="rhead"><span class="dia">◈</span><span class="nm">'+T("nothing")+'</span></div><button class="btn btn-primary btn-block" data-a="newProject" style="margin-top:12px">'+T("startProject")+'</button></div>';
  }
  var p=withSess[0],s=p.sessions[p.sessions.length-1];
  var commits=(p.commits||[]).slice(0,3),decs=S.decisions.filter(function(d){return d.projectId===p.id}).slice(0,3),blk=p.blockers||[],docs=S.notes.filter(function(n){return n.projectId===p.id}).slice(0,3);
  var signals=commits.length+decs.length+blk.length+docs.length+((s.accomplishments||[]).length);
  var mn='';
  mn+='<div class="greet">'+T(greetKey())+'</div>';
  mn+=ctxStrip();
  mn+='<div class="hero-card">';
  mn+='<div class="badgerow"><span class="badge"><i class="pulse"></i>'+T("contextRecovered")+'</span><span class="lastact">'+T("lastWorked")+' '+rel(p.lastWorkedAt)+'</span></div>';
  mn+='<div class="lbl2">'+T("resumeYourWork")+'</div>';
  mn+='<h2 class="herotitle">'+esc(p.name)+(p.version?' · <span class="grad">'+esc(p.version)+'</span>':'')+(p.subtitle?' <span class="dash">—</span> <span class="grad">'+esc(p.subtitle)+'</span>':'')+'</h2>';
  mn+='<div class="summbox"><div class="siglbl">'+T("sessionSummary")+'</div><div class="summ">'+esc(s.summary||"—")+'</div></div>';
  if((s.accomplishments||[]).length){mn+='<ul class="acc">';s.accomplishments.forEach(function(a){mn+='<li>'+esc(a)+'</li>'});mn+='</ul>';}
  mn+='<div class="row" style="gap:10px;margin-top:14px;flex-wrap:wrap"><button class="btn btn-primary" data-a="resume" data-id="'+p.id+'">'+T("continueLeft")+' →</button><button class="btn btn-ghost" data-a="open" data-id="'+p.id+'">'+T("sessionNotes")+'</button></div>';
  if(p.nextAction)mn+='<div class="nextaction"><span class="lbl">'+T("nextAction")+'</span><div class="na">'+esc(p.nextAction)+'</div></div>';
  mn+='</div>';
  var focus=S.tasks.filter(function(t){return !t.done&&t.due}).sort(function(a,b){return(a.due-b.due)||(prioRank(b.priority)-prioRank(a.priority))});
  var est=focus.reduce(function(a,t){return a+(t.estimate||0)},0);
  mn+='<div class="eyebrow between2"><span>'+T("todaysFocus")+'</span><span class="cntlite">'+focus.length+' '+T("items")+(est?' · '+fmtEst(est)+' '+T("estimate"):'')+'</span></div>';
  if(focus.length){focus.slice(0,6).forEach(function(t){var pr=project(t.projectId);
    mn+='<div class="item task"><button class="check '+(t.done?"on":"")+'" data-a="toggle" data-id="'+t.id+'">'+svg(IC.check)+'</button><div class="body"><div class="t">'+esc(t.title)+'</div><div class="m">'+(pr?esc(pr.name)+' · ':'')+T("due")+' '+dueLabel(t.due)+'</div></div>'+prioPill(t.priority)+'</div>';
  });}else{mn+='<div class="empty" style="padding:18px">'+T("noNext")+'</div>';}
  var sugg=aiSuggestions();
  if(sugg.length){mn+='<div class="eyebrow">✦ '+T("aiSuggestions")+'</div>';
    sugg.forEach(function(x){mn+='<div class="sugg"><div class="sicon">'+x.icon+'</div><div><div class="st2">'+esc(x.title)+'</div><div class="ss">'+esc(x.sub)+'</div></div></div>'})}
  var rail='';
  if(commits.length)rail+=signalBlock(T("recentCommits"),commits.map(function(c){return '<div class="sig"><span class="mono2">'+esc(c.hash)+'</span><span class="sigt">'+esc(c.msg)+'</span><span class="sigw">'+rel(c.at)+'</span></div>'}).join(""));
  if(decs.length)rail+=signalBlock(T("recentDecisions"),decs.map(function(d){return '<div class="sig"><span class="bl '+(d.status==="pending"?"warn":"ok")+'">•</span><span class="sigt">'+esc(d.text)+'</span></div>'}).join(""));
  if(blk.length)rail+=signalBlock(T("blockersT"),blk.map(function(b){return '<div class="sig"><span class="bl danger">•</span><span class="sigt">'+esc(b)+'</span></div>'}).join(""));
  if(docs.length)rail+=signalBlock(T("relevantDocs"),'<div class="docchips">'+docs.map(function(n){return '<button class="docchip" data-a="openNote" data-id="'+n.id+'">'+esc(n.title)+'</button>'}).join("")+'</div>');
  rail+='<div class="recon">◷ '+T("reconstructed")(signals)+'</div>';
  return '<div class="home-grid"><div class="home-main">'+mn+'</div><aside class="home-rail">'+rail+'</aside></div>';
}

function vKnowledge(){

  var chips=[["what was I doing",S.lang==="ar"?"كنت بعمل إيه؟":"What was I doing?"],["next",S.lang==="ar"?"الخطوات الجاية":"Next actions"],["blockers",S.lang==="ar"?"العوائق":"Blockers"],["decisions",S.lang==="ar"?"القرارات":"Decisions"]];
  h+='<div class="chips" style="margin-bottom:14px">'+chips.map(function(c){return '<button class="chip" data-a="askChip" data-q="'+esc(c[0])+'">'+esc(c[1])+'</button>'}).join("")+'</div>';

function answer(q){
  q=q.toLowerCase();
  var ws=S.projects.filter(function(p){return p.sessions&&p.sessions.length}).sort(function(a,b){return b.lastWorkedAt-a.lastWorkedAt});
  if(/doing|كنت|بعمل|resume|سياق/.test(q)&&ws.length){var p=ws[0],s=p.sessions[p.sessions.length-1];
    return '<div class="who">🤖</div><div><b style="color:var(--c-ink-900)">'+esc(p.name)+'</b> — '+esc(s.summary||"")+'<div class="na" style="margin-top:8px">▸ '+esc(s.nextStep||p.nextAction||"")+'</div></div>'}
  if(/next|جاي|خطو/.test(q)){var ns=S.projects.filter(function(p){return p.nextAction});return '<div class="who">🤖</div><div>'+(ns.length?ns.map(function(p){return '▸ '+esc(p.nextAction)+' <span class="m">('+esc(p.name)+')</span>'}).join("<br>"):T("noNext"))+'</div>'}
  if(/block|عوائق|عائق/.test(q)){var bl=[];S.projects.forEach(function(p){(p.blockers||[]).forEach(function(b){bl.push('⚠ '+esc(b)+' <span class="m">('+esc(p.name)+')</span>')})});return '<div class="who">🤖</div><div>'+(bl.length?bl.join("<br>"):"—")+'</div>'}
  if(/decision|قرار/.test(q)){return '<div class="who">🤖</div><div>'+(S.decisions.length?S.decisions.map(function(d){var p=project(d.projectId);return '⚖ '+esc(d.text)+' <span class="m">('+(p?esc(p.name):"")+')</span>'}).join("<br>"):"—")+'</div>'}
  var hits=[];S.notes.forEach(function(n){if((n.title+n.body).toLowerCase().indexOf(q)>=0)hits.push('📝 '+esc(n.title))});S.tasks.forEach(function(t){if(t.title.toLowerCase().indexOf(q)>=0)hits.push('✓ '+esc(t.title))});
  return '<div class="who">🤖</div><div>'+(hits.length?hits.slice(0,8).join("<br>"):T("noResults"))+'</div>';
}

var TT=document.getElementById("toast"),ttimer;

/* ---------------- actions ---------------- */
function go(view){S.view=view;save();render()}
function open(id){var from=S.view;S.back=(from==="project")?(S.back||"projects"):from;S.activePid=id;S.view="project";save();render()}

document.addEventListener("click",function(e){
  var el=e.target.closest("[data-a]");if(!el)return;
  var a=el.getAttribute("data-a"),id=el.getAttribute("data-id");
  switch(a){
    case"go":go(el.getAttribute("data-v"));break;
    case"back":S.view=(S.view==="project")?(S.back||"projects"):"home";save();render();break;
    case"open":open(id);break;
    case"addTask":sheetAddTask(id);break;
    case"doAddTask2":{var ti=val("tkTitle");if(!ti)return;var due=SH._due==="today"?startOfDay(Date.now()):SH._due==="tomorrow"?startOfDay(Date.now())+86400000:null;
      S.tasks.push({id:uid(),title:ti,projectId:id,done:false,isNext:false,priority:SH._prio||"med",due:due,estimate:0,createdAt:Date.now(),priority_n:S.tasks.length+1});save();closeSheet();render();break;}
    case"drawerOpen":document.getElementById("drawerBack").classList.remove("open");open(id);break;
    case"newBookmark":sheetForm(T("addBookmark"),[["bkTitle",T("noteTitle"),""],["bkUrl",T("url"),""]],"doBookmark");break;
    case"doBookmark":{var ti=val("bkTitle"),u=val("bkUrl");if(!ti&&!u)return;S.bookmarks.unshift({id:uid(),title:ti||u,url:u,kind:"link",createdAt:Date.now()});save();closeSheet();render();break;}
    case"newCourse":sheetForm(T("addCourse"),[["csTitle",T("noteTitle"),""],["csProv",T("provider"),""],["csTotal","# ("+T("estimate")+")",""]],"doCourse");break;
    case"doCourse":{var ti=val("csTitle");if(!ti)return;S.courses.unshift({id:uid(),title:ti,provider:val("csProv"),total:parseInt(val("csTotal"))||0,current:0,progress:0,createdAt:Date.now()});save();closeSheet();render();break;}
    case"newPrompt":sheetForm(T("addPrompt"),[["ptTitle",T("noteTitle"),""],["ptModel","Model",""],["ptBody","Prompt",""]],"doPrompt");break;
    case"doPrompt":{var ti=val("ptTitle");if(!ti)return;S.prompts.unshift({id:uid(),title:ti,model:val("ptModel"),category:"",body:val("ptBody"),createdAt:Date.now()});save();closeSheet();render();break;}
    case"newServer":sheetForm(T("addServer"),[["svName",T("noteTitle"),""],["svHost","Host",""],["svPorts","Ports",""],["svNotes",T("noteBody"),""]],"doServer");break;
    case"doServer":{var ti=val("svName");if(!ti)return;S.servers.unshift({id:uid(),name:ti,host:val("svHost"),ports:val("svPorts"),notes:val("svNotes"),createdAt:Date.now()});save();closeSheet();render();break;}
    case"newRepo":sheetForm(T("addRepo"),[["rpName",T("noteTitle"),""],["rpBranch","Branch",""],["rpUrl",T("url"),""]],"doRepo");break;
    case"doRepo":{var ti=val("rpName");if(!ti)return;S.repos.unshift({id:uid(),name:ti,branch:val("rpBranch"),url:val("rpUrl"),projectId:S.activePid||null,createdAt:Date.now()});save();closeSheet();render();break;}
    case"addBlocker":sheetForm(T("addBlocker"),[["blText",T("blockersT"),""]],"doAddBlocker");break;
    case"doAddBlocker":{var v=val("blText");if(!v)return;var p=project(S.activePid);p.blockers=p.blockers||[];p.blockers.unshift(v);save();closeSheet();render();break;}
    case"addCommit":sheetForm(T("addCommit"),[["cmHash","Hash",""],["cmMsg",T("noteTitle"),""]],"doAddCommit");break;
    case"doAddCommit":{var hh=val("cmHash"),mm=val("cmMsg");if(!mm)return;var p=project(S.activePid);p.commits=p.commits||[];p.commits.unshift({hash:hh||uid().slice(0,6),msg:mm,at:Date.now()});save();closeSheet();render();break;}
    case"logDecision":sheetForm(T("logDecision"),[["dcText",T("noteTitle"),""],["dcReason",T("reason"),""]],"doLogDecision");break;
    case"doLogDecision":{var tx=val("dcText");if(!tx)return;S.decisions.unshift({id:uid(),text:tx,reason:val("dcReason"),projectId:S.activePid,status:"decided",at:Date.now()});save();closeSheet();render();break;}
    case"doAsk":{var e=document.getElementById("askInput");S._ask=e?e.value:"";save();render();setTimeout(function(){var x=document.getElementById("askInput");if(x)x.focus()},0);break;}
    case"askChip":S._ask=el.getAttribute("data-q");save();render();break;
    case"capture":sheetCapture();break;
    case"menu":document.getElementById("drawerBack").classList.add("open");break;
    case"drawerGo":{var dv=el.getAttribute("data-v");document.getElementById("drawerBack").classList.remove("open");S.view=dv;save();render();break;}
    case"setMode":{S.mode=el.getAttribute("data-m");S.view=S.mode==="quick"?"qtoday":"home";document.getElementById("drawerBack").classList.remove("open");save();render();break;}
    case"setView":{S.uiView=el.getAttribute("data-vw");if(S.uiView==="mobile")document.getElementById("drawerBack").classList.remove("open");save();render();break;}
    case"quickTheme":S.theme=S.theme==="dark"?"light":"dark";document.querySelector('meta[name=theme-color]').setAttribute("content",S.theme==="dark"?"#0B0C0F":"#F4F5F8");save();render();break;
    case"quickLang":S.lang=S.lang==="ar"?"en":"ar";save();render();break;
    case"quickAddTask":{var inp=document.getElementById("qAdd");var v=inp?inp.value.trim():"";if(!v)return;
      S.tasks.push({id:uid(),title:v,projectId:null,done:false,isNext:false,createdAt:Date.now(),priority:S.tasks.length+1});save();render();
      setTimeout(function(){var e=document.getElementById("qAdd");if(e)e.focus()},0);break;}
    case"triage":sheetTriage();break;
    case"newProject":sheetNewProject();break;
    case"closeSheet":closeSheet();break;
    case"doCapture":{var t=document.getElementById("capText").value.trim();if(!t)return;
      S.inbox.unshift({id:uid(),text:t,kind:SH._kind?SH._kind():"idea",createdAt:Date.now()});save();closeSheet();toast(T("added"));render();break;}
    case"doNewProject":{var nm=document.getElementById("npName").value.trim();if(!nm)return;
      var np={id:uid(),name:nm,icon:"◈",status:"active",stage:"",nextAction:"",lastWorkedAt:Date.now(),createdAt:Date.now(),sessions:[]};
      S.projects.push(np);save();closeSheet();open(np.id);break;}
    case"resume":{var p=project(id);p.lastWorkedAt=Date.now();p.status="active";save();toast(T("resumed"));open(id);break;}
    case"snapshot":sheetSnapshot(id);break;
    case"doSnapshot":{var p=project(id);var done=val("snDone");var nx=val("snNext");var acc=val("snAcc");var bl=val("snBlock");
      p.sessions=p.sessions||[];p.sessions.push({id:uid(),startedAt:p.lastWorkedAt||Date.now(),endedAt:Date.now(),summary:done,nextStep:nx,accomplishments:acc?acc.split("\n").map(function(x){return x.replace(/^[-•\s]+/,"").trim()}).filter(Boolean):[]});
      if(nx)p.nextAction=nx;if(bl){p.blockers=p.blockers||[];p.blockers.unshift(bl);}p.lastWorkedAt=Date.now();save();closeSheet();toast(T("saved"));render();break;}
    case"status":break; // handled by change
    case"editNext":sheetPrompt(T("nextAction"),T("setNext"),project(id).nextAction,"doEditNext",id);break;
    case"doEditNext":{var v=document.getElementById("promptInput").value.trim();project(id).nextAction=v;save();closeSheet();render();break;}
    case"toggle":{var t=S.tasks.find(function(x){return x.id===id});t.done=!t.done;save();render();break;}
    case"toggleNext":{var t=S.tasks.find(function(x){return x.id===id});t.isNext=!t.isNext;save();render();break;}
    case"tfilter":S._taskFilter=el.getAttribute("data-f");render();break;
    case"addNote":sheetNote(id,null);break;
    case"openNote":{var n=S.notes.find(function(x){return x.id===id});sheetNote(n.projectId,id);break;}
    case"doNote":{var pid=el.getAttribute("data-pid"),ti=document.getElementById("ntTitle").value.trim(),bo=document.getElementById("ntBody").value.trim();
      if(!ti&&!bo)return;if(id){var n=S.notes.find(function(x){return x.id===id});n.title=ti;n.body=bo;n.updatedAt=Date.now();}
      else{S.notes.push({id:uid(),title:ti||"—",body:bo,projectId:pid,createdAt:Date.now(),updatedAt:Date.now()});}
      save();closeSheet();toast(T("saved"));render();break;}
    case"delNote":{S.notes=S.notes.filter(function(x){return x.id!==id});save();closeSheet();render();break;}
    case"delProject":{if(confirm(T("delete")+" — "+esc(project(id).name)+"؟")){S.projects=S.projects.filter(function(x){return x.id!==id});S.tasks=S.tasks.filter(function(t){return t.projectId!==id});S.notes=S.notes.filter(function(nn){return nn.projectId!==id});S.view="projects";save();render();}break;}
    case"triageTask":{var it=S.inbox.find(function(x){return x.id===id});var sel=document.querySelector('[data-triage-proj="'+id+'"]');var pid=sel?sel.value:"";
      S.tasks.push({id:uid(),title:it.text,projectId:pid||null,done:false,isNext:false,createdAt:Date.now(),priority:S.tasks.length+1});
      S.inbox=S.inbox.filter(function(x){return x.id!==id});save();sheetTriage();break;}
    case"triageNote":{var it=S.inbox.find(function(x){return x.id===id});var sel=document.querySelector('[data-triage-proj="'+id+'"]');var pid=sel?sel.value:"";
      S.notes.push({id:uid(),title:it.text.slice(0,40),body:it.text,projectId:pid||null,createdAt:Date.now(),updatedAt:Date.now()});
      S.inbox=S.inbox.filter(function(x){return x.id!==id});save();sheetTriage();break;}
    case"triageDel":{S.inbox=S.inbox.filter(function(x){return x.id!==id});save();sheetTriage();break;}
    case"saveJournal":{var tk=todayKey();var v=document.getElementById("jnote").value;S.journal[tk]=S.journal[tk]||{};S.journal[tk].note=v;save();toast(T("saved"));break;}
    case"lang":S.lang=el.getAttribute("data-l");save();render();break;
    case"theme":S.theme=el.getAttribute("data-t");document.querySelector('meta[name=theme-color]').setAttribute("content",S.theme==="dark"?"#0B0C0F":"#F4F5F8");save();render();break;
    case"export":{var blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});var u=URL.createObjectURL(blob);var a=document.createElement("a");a.href=u;a.download="continuum-backup.json";a.click();break;}
    case"clear":{if(confirm(T("clearQ"))){S=seed();S.view="home";save();render();}break;}
  }
});
// status select change
document.addEventListener("change",function(e){
  var s=e.target.closest('[data-a="status"]');
  if(s){project(S.activePid).status=s.value;save();render();}
});
// search input
document.addEventListener("input",function(e){
  if(e.target.id==="searchInput"){S._q=e.target.value;var pos=e.target.selectionStart;renderMain();var ni=document.getElementById("searchInput");if(ni){ni.focus();try{ni.setSelectionRange(pos,pos)}catch(_){}}}
});
// drawer overlay close
document.getElementById("drawerBack").addEventListener("click",function(e){if(e.target===this)this.classList.remove("open")});
// enter to quick-add / ask
document.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&e.target&&e.target.id==="qAdd"){e.preventDefault();var b=document.querySelector('[data-a="quickAddTask"]');if(b)b.click();}
  if(e.key==="Enter"&&e.target&&e.target.id==="askInput"){e.preventDefault();var b=document.querySelector('[data-a="doAsk"]');if(b)b.click();}
});

// ambient particles (always alive)
(function particles(){
  var c=document.getElementById("particles");if(!c||!c.getContext)return;var ctx=c.getContext("2d");if(!ctx)return;var ps=[],w,h;
  function size(){w=c.width=c.offsetWidth||window.innerWidth;h=c.height=c.offsetHeight||window.innerHeight;}
  function mk(){return{x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.3+.3,vx:(Math.random()-.5)*.14,vy:(Math.random()-.5)*.14,a:Math.random()*.25+.05,ph:Math.random()*6.28,ps:Math.random()*.01+.004}}
  function init(){size();ps=[];for(var i=0;i<34;i++)ps.push(mk())}
  function loop(){ctx.clearRect(0,0,w,h);for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;p.ph+=p.ps;if(p.x<-10)p.x=w+10;if(p.x>w+10)p.x=-10;if(p.y<-10)p.y=h+10;if(p.y>h+10)p.y=-10;var a=p.a*(.6+.4*Math.sin(p.ph));ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.1,p.r),0,6.283);ctx.fillStyle="rgba(180,200,255,"+a+")";ctx.fill();}requestAnimationFrame(loop)}
  init();loop();window.addEventListener("resize",init);
})();

render();
})();
</script>
